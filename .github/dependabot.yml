version: 2
updates:
  # Bun 依存関係の更新
  - package-ecosystem: "bun"
    directories:
      - "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    groups:
      all-dependencies:
        patterns: ["*"]
    ignore:
      # メジャーバージョンの更新は対象外
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Biome は更新対象外
      - dependency-name: "@biomejs/biome"
    versioning-strategy: increase
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 3
      default-days: 7
    open-pull-requests-limit: 10

  # GitHub Actions の更新
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    cooldown:
      default-days: 3 # zizmor: ignore[dependabot-cooldown]
    groups:
      actions:
        patterns: ["*"]
